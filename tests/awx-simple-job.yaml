# Required extra vars for testing
# ansible-playbook -e "job_id=INTEGER" -e "job_status=STATUS" -e "automation_id=UUID" tests/awx-simple-job.yaml
#
# Available statuses: success, failed, skipped

- name: Test Ansible Playbook
  hosts: localhost
  vars:
    heimdallr_url: "http://localhost:8080"
    job_id: "1000"
    job_location: "global"
    job_url: "https://example.com/#/jobs/playbook/100"
  tasks:
    - name: Assert automation_id is set
      ansible.builtin.assert:
        that:
          - job_status is defined and job_status != ""
          - automation_id is defined and automation_id != ""
        fail_msg: "job_status or automation_id are not set"

    - block:
        - name: Do work
          ansible.builtin.debug:
            msg: "Doing work"
          failed_when: job_status != "success"

        - name: Push successful job
          ansible.builtin.uri:
            url: "{{ heimdallr_url }}/api/v1/automation/{{ automation_id }}/job"
            method: POST
            body_format: json
            body:
              id: "{{ job_id }}"
              status: "{{ job_status }}"
              location: "{{ job_location }}"
              url: "{{ job_url }}"
              output: "{{ '<h2>Job output</h2>' | b64encode if job_status in ['success', 'failed'] else omit }}"
            status_code: 201

        - name: Handle success job work
          ansible.builtin.debug:
            msg: "Job succeeded"
      rescue:
        - name: Push failed job
          ansible.builtin.uri:
            url: "{{ heimdallr_url }}/api/v1/automation/{{ automation_id }}/job"
            method: POST
            body_format: json
            body:
              id: "{{ job_id }}"
              status: failed
              location: "{{ job_location }}"
              url: "{{ job_url }}"
              output: "{{ '<h2>Job failed</h2>' | b64encode }}"
            status_code: 201

        - name: Handle failed job work
          ansible.builtin.debug:
            msg: "Job failed"
