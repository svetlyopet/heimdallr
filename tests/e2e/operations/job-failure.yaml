---
- name: Job failure flow
  hosts: localhost
  vars:
    heimdallr_url: "{{ lookup('env', 'HEIMDALLR_URL') | default('http://localhost:8080', true) }}"
    heimdallr_user: "{{ lookup('env', 'HEIMDALLR_USER') | default('root', true) }}"
    heimdallr_password: "{{ lookup('env', 'HEIMDALLR_PASSWORD') | default('e2e-test-password', true) }}"
    auth_headers:
      X-Auth-Username: "{{ heimdallr_user }}"
      X-Auth-Password: "{{ heimdallr_password }}"
    job_id: "{{ lookup('env', 'JOB_ID') | default('1001', true) }}"
    automation_id: "{{ lookup('file', playbook_dir + '/.automation_id') }}"
  tasks:
    - name: Register job
      ansible.builtin.uri:
        url: "{{ heimdallr_url }}/api/v1/automation/{{ automation_id }}/job"
        method: POST
        headers: "{{ auth_headers }}"
        body_format: json
        body:
          id: "{{ job_id }}"
          status: started
          location: global
          url: "https://example.com/#/jobs/playbook/201"
          metadata:
            inventory: "true"
        status_code: 201

    - block:
        - name: Force failure
          ansible.builtin.fail:
            msg: "Simulated job failure"

      rescue:
        - name: Set failed job status
          ansible.builtin.uri:
            url: "{{ heimdallr_url }}/api/v1/automation/{{ automation_id }}/job/{{ job_id }}"
            method: PATCH
            headers: "{{ auth_headers }}"
            body_format: json
            body:
              status: failed
            status_code: 200
