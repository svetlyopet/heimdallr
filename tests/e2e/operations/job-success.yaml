---
- name: Job success flow
  hosts: localhost
  vars:
    heimdallr_url: "{{ lookup('env', 'HEIMDALLR_URL') | default('http://localhost:8080', true) }}"
    heimdallr_user: "{{ lookup('env', 'HEIMDALLR_USER') | default('root', true) }}"
    heimdallr_password: "{{ lookup('env', 'HEIMDALLR_PASSWORD') | default('e2e-test-password', true) }}"
    auth_headers:
      X-Auth-Username: "{{ heimdallr_user }}"
      X-Auth-Password: "{{ heimdallr_password }}"
    job_id: "{{ lookup('env', 'JOB_ID') | default('1000', true) }}"
    job_status: success
    automation_id: "{{ lookup('file', playbook_dir + '/.automation_id') }}"
  tasks:
    - name: Register job
      ansible.builtin.uri:
        url: "{{ heimdallr_url }}/api/v1/automation/{{ automation_id }}/job"
        method: POST
        headers: "{{ auth_headers }}"
        body_format: json
        body:
          id: "{{ job_id }}"
          status: started
          location: global
          url: "https://example.com/#/jobs/playbook/200"
          metadata:
            hypervisor: kvm
            inventory: "true"
        status_code: 201

    - name: Do work
      ansible.builtin.debug:
        msg: "Doing work"

    - name: Set success job status
      ansible.builtin.uri:
        url: "{{ heimdallr_url }}/api/v1/automation/{{ automation_id }}/job/{{ job_id }}"
        method: PATCH
        headers: "{{ auth_headers }}"
        body_format: json
        body:
          status: "{{ job_status }}"
          output: "{{ '<h2>E2E job output</h2>' | b64encode }}"
        status_code: 200
