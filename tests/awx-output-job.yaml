# Required extra vars for testing
# ansible-playbook -e "job_id=INTEGER" -e "job_status=STATUS" -e "automation_id=UUID" tests/awx-simple-job.yaml
#
# Available statuses: started, success, failed

- name: Test Ansible Playbook
  hosts: localhost
  vars:
    heimdallr_url: "http://localhost:8080"
    job_id: "1000"
    job_location: "global"
    job_url: "https://example.com/#/jobs/playbook/200"
    heimdallr_user: "{{ lookup('env', 'HEIMDALLR_USER') | default('root', true) }}"
    heimdallr_password: "{{ lookup('env', 'HEIMDALLR_PASSWORD') | default('', true) }}"
  tasks:
    - name: Login and obtain bearer token
      ansible.builtin.uri:
        url: "{{ heimdallr_url }}/api/v1/auth/login"
        method: POST
        body_format: json
        body:
          username: "{{ heimdallr_user }}"
          password: "{{ heimdallr_password }}"
        status_code: 200
      register: login_response

    - name: Set auth headers
      ansible.builtin.set_fact:
        auth_headers:
          Authorization: "Bearer {{ login_response.json.data.token }}"
          Content-Type: application/json

    - name: Assert automation_id is set
      ansible.builtin.assert:
        that:
          - job_status is defined and job_status != ""
          - automation_id is defined and automation_id != ""
        fail_msg: "job_status or automation_id are not set"

    - name: Register job
      ansible.builtin.uri:
        url: "{{ heimdallr_url }}/api/v1/automation/{{ automation_id }}/job"
        method: POST
        headers: "{{ auth_headers }}"
        body_format: json
        body:
          id: "{{ job_id }}"
          status: "started"
          location: "{{ job_location }}"
          url: "{{ job_url }}"
          metadata:
            hypervisor: "kvm"
            inventory: "true"
        status_code: 201

    - block:
        - name: Do work
          ansible.builtin.debug:
            msg: "Doing work"
          failed_when: job_status != "success"

        - name: Set success job status
          ansible.builtin.uri:
            url: "{{ heimdallr_url }}/api/v1/automation/{{ automation_id }}/job/{{ job_id }}"
            method: PATCH
            headers: "{{ auth_headers }}"
            body_format: json
            body:
              status: "{{ job_status }}"
              output: "{{ '<h2>This is a test output.</h2><br>Placeholder for output report.</br>' | b64encode }}"
            status_code: 200

        - name: Handle success job work
          ansible.builtin.debug:
            msg: "Job succeeded"
      rescue:
        - name: Set failed job status
          ansible.builtin.uri:
            url: "{{ heimdallr_url }}/api/v1/automation/{{ automation_id }}/job/{{ job_id }}"
            method: PATCH
            headers: "{{ auth_headers }}"
            body_format: json
            body:
              status: "failed"
            status_code: 200

        - name: Handle failed job work
          ansible.builtin.debug:
            msg: "Job failed"