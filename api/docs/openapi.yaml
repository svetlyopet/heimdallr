openapi: 3.1.0
info:
  title: Heimdallr API
  version: 1.0.0
  description: API for managing applications, releases, compliance reports, servers, agents, providers, automations, and automation jobs.

servers:
  - url: /api
    description: API base path

tags:
  - name: Application
  - name: Release
  - name: Report
  - name: Provider
  - name: Automation
  - name: Job
  - name: Server
  - name: Agent
  - name: Analytics
  - name: Auth
  - name: Token

paths:
  /v1/provider:
    get:
      tags:
        - Provider
      summary: List providers
      operationId: listProviders
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Providers returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Provider
      summary: Create provider
      operationId: createProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderCreateRequest"
      responses:
        "201":
          description: Provider created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/provider/{provider_id}:
    get:
      tags:
        - Provider
      summary: Get provider by ID
      operationId: getProvider
      parameters:
        - $ref: "#/components/parameters/ProviderIDPath"
      responses:
        "200":
          description: Provider returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/automation:
    get:
      tags:
        - Automation
      summary: List automations
      operationId: listAutomations
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Automations returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Automation
      summary: Create automation
      operationId: createAutomation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationCreateRequest"
      responses:
        "201":
          description: Automation created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/automation/{automation_id}:
    get:
      tags:
        - Automation
      summary: Get automation by ID
      operationId: getAutomation
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
      responses:
        "200":
          description: Automation returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      tags:
        - Automation
      summary: Update automation
      operationId: updateAutomation
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationUpdateRequest"
      responses:
        "200":
          description: Automation updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags:
        - Automation
      summary: Delete automation
      operationId: deleteAutomation
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
      responses:
        "204":
          description: Automation deleted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/automation/{automation_id}/job:
    get:
      tags:
        - Job
      summary: List jobs for automation
      operationId: listAutomationJobs
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Jobs returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Job
      summary: Create job for automation
      operationId: createAutomationJob
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobCreateRequest"
      responses:
        "201":
          description: Job created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/automation/{automation_id}/job/{job_id}:
    get:
      tags:
        - Job
      summary: Get job by composite ID
      description: Returns a job scoped by automation ID and job ID.
      operationId: getAutomationJob
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
        - $ref: "#/components/parameters/JobID"
      responses:
        "200":
          description: Job returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags:
        - Job
      summary: Update job status
      description: Updates a job scoped by automation ID and job ID.
      operationId: updateAutomationJob
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
        - $ref: "#/components/parameters/JobID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdateRequest"
      responses:
        "200":
          description: Job updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/report:
    get:
      tags:
        - Report
      summary: List reports across applications
      operationId: listReportsGlobal
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: application_id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
        - name: release_id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - started
              - skipped
              - success
              - failed
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum:
              - sast
              - dast
              - sbom
              - code_coverage
              - custom
      responses:
        "200":
          description: Reports returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/server:
    get:
      tags:
        - Server
      summary: List servers
      operationId: listServers
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Servers returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Server
      summary: Create server
      operationId: createServer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerCreateRequest"
      responses:
        "201":
          description: Server created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/server/{server_id}:
    get:
      tags:
        - Server
      summary: Get server by ID
      operationId: getServer
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
      responses:
        "200":
          description: Server returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerWithRelationsDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      tags:
        - Server
      summary: Register agents on an existing server
      operationId: updateServer
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerUpdateRequest"
      responses:
        "200":
          description: Server updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerWithRelationsDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/agent:
    get:
      tags:
        - Agent
      summary: List agents
      operationId: listGlobalAgents
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: unassigned
          in: query
          required: false
          schema:
            type: boolean
          description: When true, return only agents not assigned to a server
      responses:
        "200":
          description: Agents returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Agent
      summary: Register an unassigned agent
      operationId: createUnassignedAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentCreateRequest"
      responses:
        "201":
          description: Agent created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/agent/{agent_id}:
    get:
      tags:
        - Agent
      summary: Get agent by ID
      operationId: getGlobalAgent
      parameters:
        - $ref: "#/components/parameters/AgentIDPath"
      responses:
        "200":
          description: Agent returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/server/{server_id}/agent:
    get:
      tags:
        - Agent
      summary: List agents installed on a server
      operationId: listAgents
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Agents returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Agent
      summary: Register an agent on a server
      operationId: createAgent
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentCreateRequest"
      responses:
        "201":
          description: Agent created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/server/{server_id}/agent/{agent_id}:
    get:
      tags:
        - Agent
      summary: Get agent by ID
      operationId: getAgent
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
        - $ref: "#/components/parameters/AgentIDPath"
      responses:
        "200":
          description: Agent returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags:
        - Agent
      summary: Remove an agent from a server
      operationId: deleteAgent
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
        - $ref: "#/components/parameters/AgentIDPath"
      responses:
        "204":
          description: Agent deleted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/server/{server_id}/job:
    get:
      tags:
        - Server
      summary: List automation jobs associated with a server
      operationId: listServerJobs
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Associated jobs returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerJobListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Server
      summary: Associate an existing automation job with a server
      operationId: associateServerJob
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerJobAssociateRequest"
      responses:
        "201":
          description: Job associated successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/server/{server_id}/job/{job_id}:
    delete:
      tags:
        - Server
      summary: Dissociate an automation job from a server
      operationId: dissociateServerJob
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
        - $ref: "#/components/parameters/JobID"
        - name: automation_id
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "204":
          description: Job dissociated successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/server/{server_id}/release:
    get:
      tags:
        - Server
      summary: List releases associated with a server
      operationId: listServerReleases
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Associated releases returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerReleaseListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Server
      summary: Associate an existing release with a server
      operationId: associateServerRelease
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerReleaseAssociateRequest"
      responses:
        "201":
          description: Release associated successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/server/{server_id}/release/{release_id}:
    delete:
      tags:
        - Server
      summary: Dissociate a release from a server
      operationId: dissociateServerRelease
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
        - name: release_id
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/UUID"
      responses:
        "204":
          description: Release dissociated successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/analytics/automation:
    get:
      tags:
        - Analytics
      summary: Get automation analytics overview
      operationId: getAutomationAnalyticsOverview
      responses:
        "200":
          description: Automation analytics overview returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsAutomationDataResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/analytics/automation/{automation_id}:
    get:
      tags:
        - Analytics
      summary: Get analytics overview for one automation
      operationId: getAutomationAnalyticsOverviewByID
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
      responses:
        "200":
          description: Automation analytics returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsAutomationDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/auth/users:
    get:
      tags:
        - Auth
      summary: List users
      operationId: listUsers
      responses:
        "200":
          description: Users returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Auth
      summary: Create user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCreateUserRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/auth/users/{user_id}:
    put:
      tags:
        - Auth
      summary: Update user
      operationId: updateUser
      parameters:
        - $ref: "#/components/parameters/UserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthUpdateUserRequest"
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags:
        - Auth
      summary: Delete user
      operationId: deleteUser
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "204":
          description: User deleted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 10

    ProviderIDPath:
      name: provider_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    AutomationIDPath:
      name: automation_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    JobID:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1

    UserID:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ServerIDPath:
      name: server_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    AgentIDPath:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
