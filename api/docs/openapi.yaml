openapi: 3.1.0
info:
  title: Heimdallr API
  version: 1.0.0
  description: API for managing providers, automations, and automation jobs.

servers:
  - url: /api
    description: API base path

tags:
  - name: Provider
  - name: Automation
  - name: Job
  - name: Analytics
  - name: Auth

paths:
  /v1/provider:
    get:
      tags:
        - Provider
      summary: List providers
      operationId: listProviders
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Providers returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Provider
      summary: Create provider
      operationId: createProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderCreateRequest"
      responses:
        "201":
          description: Provider created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/provider/{provider_id}:
    get:
      tags:
        - Provider
      summary: Get provider by ID
      operationId: getProvider
      parameters:
        - $ref: "#/components/parameters/ProviderIDPath"
      responses:
        "200":
          description: Provider returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/automation:
    get:
      tags:
        - Automation
      summary: List automations
      operationId: listAutomations
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Automations returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Automation
      summary: Create automation
      operationId: createAutomation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationCreateRequest"
      responses:
        "201":
          description: Automation created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/automation/{automation_id}:
    get:
      tags:
        - Automation
      summary: Get automation by ID
      operationId: getAutomation
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
      responses:
        "200":
          description: Automation returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      tags:
        - Automation
      summary: Update automation
      operationId: updateAutomation
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationUpdateRequest"
      responses:
        "200":
          description: Automation updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags:
        - Automation
      summary: Delete automation
      operationId: deleteAutomation
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
      responses:
        "204":
          description: Automation deleted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/automation/{automation_id}/job:
    get:
      tags:
        - Job
      summary: List jobs for automation
      operationId: listAutomationJobs
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Jobs returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Job
      summary: Create job for automation
      operationId: createAutomationJob
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobCreateRequest"
      responses:
        "201":
          description: Job created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/automation/{automation_id}/job/{job_id}:
    get:
      tags:
        - Job
      summary: Get job by composite ID
      description: Returns a job scoped by automation ID and job ID.
      operationId: getAutomationJob
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
        - $ref: "#/components/parameters/JobID"
      responses:
        "200":
          description: Job returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags:
        - Job
      summary: Update job status
      description: Updates a job scoped by automation ID and job ID.
      operationId: updateAutomationJob
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
        - $ref: "#/components/parameters/JobID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdateRequest"
      responses:
        "200":
          description: Job updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/analytics/automation:
    get:
      tags:
        - Analytics
      summary: Get automation analytics overview
      operationId: getAutomationAnalyticsOverview
      responses:
        "200":
          description: Automation analytics overview returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsAutomationDataResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/analytics/automation/{automation_id}:
    get:
      tags:
        - Analytics
      summary: Get analytics overview for one automation
      operationId: getAutomationAnalyticsOverviewByID
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
      responses:
        "200":
          description: Automation analytics returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsAutomationDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/auth/users:
    get:
      tags:
        - Auth
      summary: List users
      operationId: listUsers
      responses:
        "200":
          description: Users returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Auth
      summary: Create user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCreateUserRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/auth/users/{user_id}:
    put:
      tags:
        - Auth
      summary: Update user
      operationId: updateUser
      parameters:
        - $ref: "#/components/parameters/UserID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthUpdateUserRequest"
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUserDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags:
        - Auth
      summary: Delete user
      operationId: deleteUser
      parameters:
        - $ref: "#/components/parameters/UserID"
      responses:
        "204":
          description: User deleted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 10

    ProviderIDPath:
      name: provider_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    AutomationIDPath:
      name: automation_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    JobID:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1

    UserID:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Insufficient role for this operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    UUID:
      type: string
      format: uuid

    URL:
      type: string
      format: uri

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          examples:
            - invalid request body

    Pagination:
      type: object
      required:
        - page
        - limit
        - total
        - total_pages
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0

    Provider:
      type: object
      required:
        - id
        - name
        - url
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        name:
          type: string
          minLength: 2
          maxLength: 100
        url:
          $ref: "#/components/schemas/URL"

    ProviderCreateRequest:
      type: object
      required:
        - name
        - url
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        url:
          $ref: "#/components/schemas/URL"

    ProviderDataResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Provider"

    ProviderListResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Provider"
        pagination:
          $ref: "#/components/schemas/Pagination"

    Automation:
      type: object
      required:
        - id
        - name
        - provider
        - provider_id
        - url
        - cost_savings
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        name:
          type: string
          minLength: 2
          maxLength: 100
        provider:
          type: string
          minLength: 2
          maxLength: 100
        provider_id:
          $ref: "#/components/schemas/UUID"
        url:
          $ref: "#/components/schemas/URL"
        cost_savings:
          type: number
          format: double
          minimum: 0

    AutomationCreateRequest:
      type: object
      required:
        - name
        - provider_id
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        provider_id:
          $ref: "#/components/schemas/UUID"
        url:
          $ref: "#/components/schemas/URL"
        cost_savings:
          type: number
          format: double
          minimum: 0
          default: 0

    AutomationUpdateRequest:
      type: object
      properties:
        url:
          $ref: "#/components/schemas/URL"
        cost_savings:
          type: number
          format: double
          minimum: 0

    AutomationDataResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Automation"

    AutomationListResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Automation"
        pagination:
          $ref: "#/components/schemas/Pagination"

    Job:
      type: object
      required:
        - id
        - automation
        - provider
        - status
        - location
        - url
      properties:
        id:
          type: string
          minLength: 1
        automation:
          type: string
          minLength: 1
        provider:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/JobStatus"
        location:
          type: string
          minLength: 1
        url:
          $ref: "#/components/schemas/URL"

    JobCreateRequest:
      type: object
      required:
        - id
        - status
        - location
        - url
      properties:
        id:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/JobStatus"
        location:
          type: string
          minLength: 1
        url:
          $ref: "#/components/schemas/URL"
        metadata:
          $ref: "#/components/schemas/JobMetadata"
        output:
          $ref: "#/components/schemas/JobOutput"

    JobUpdateRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/JobStatus"
        metadata:
          $ref: "#/components/schemas/JobMetadata"
        output:
          $ref: "#/components/schemas/JobOutput"

    JobStatus:
      type: string
      enum:
        - started
        - skipped
        - success
        - failed

    JobMetadata:
      type: object
      properties: {}

    JobOutput:
      type: string

    JobDataResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Job"

    JobListResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        pagination:
          $ref: "#/components/schemas/Pagination"

    AuthRole:
      type: string
      enum:
        - admin
        - reader

    AuthUser:
      type: object
      required:
        - id
        - username
        - email
        - roles
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        username:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            $ref: "#/components/schemas/AuthRole"

    AuthCreateUserRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        roles:
          type: array
          items:
            $ref: "#/components/schemas/AuthRole"

    AuthUpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        roles:
          type: array
          items:
            $ref: "#/components/schemas/AuthRole"

    AuthUserDataResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/AuthUser"

    AuthUserListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuthUser"

    LocationJobAnalytics:
      type: object
      required:
        - location
        - total_jobs
        - successful_jobs
        - failed_jobs
        - started_jobs
        - success_rate
      properties:
        location:
          type: string
        total_jobs:
          type: integer
          minimum: 0
        successful_jobs:
          type: integer
          minimum: 0
        failed_jobs:
          type: integer
          minimum: 0
        started_jobs:
          type: integer
          minimum: 0
        success_rate:
          type: number
          format: double

    AutomationJobAnalytics:
      type: object
      required:
        - automation_id
        - automation
        - provider
        - total_jobs
        - successful_jobs
        - failed_jobs
        - started_jobs
        - success_rate
      properties:
        automation_id:
          $ref: "#/components/schemas/UUID"
        automation:
          type: string
        provider:
          type: string
        total_jobs:
          type: integer
          minimum: 0
        successful_jobs:
          type: integer
          minimum: 0
        failed_jobs:
          type: integer
          minimum: 0
        started_jobs:
          type: integer
          minimum: 0
        success_rate:
          type: number
          format: double

    AutomationAnalytics:
      type: object
      required:
        - total_automations
        - total_jobs
        - successful_jobs
        - failed_jobs
        - started_jobs
        - success_rate
        - by_location
        - by_automation
      properties:
        total_automations:
          type: integer
          minimum: 0
        total_jobs:
          type: integer
          minimum: 0
        successful_jobs:
          type: integer
          minimum: 0
        failed_jobs:
          type: integer
          minimum: 0
        started_jobs:
          type: integer
          minimum: 0
        success_rate:
          type: number
          format: double
        by_location:
          type: array
          items:
            $ref: "#/components/schemas/LocationJobAnalytics"
        by_automation:
          type: array
          items:
            $ref: "#/components/schemas/AutomationJobAnalytics"

    AnalyticsAutomationDataResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/AutomationAnalytics"