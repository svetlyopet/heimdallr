        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API token passed as a Bearer token in the Authorization header
    SessionCookie:
      type: apiKey
      in: cookie
      name: heimdallr_session
      description: HttpOnly browser session cookie

  parameters:
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

    ProviderIDPath:
      name: provider_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    AutomationIDPath:
      name: automation_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    JobID:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1

    UserID:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ServerIDPath:
      name: server_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    AgentIDPath:
      name: agent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    RequiredAgentIDPath:
      name: required_agent_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ApplicationIDPath:
      name: application_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ReleaseIDPath:
      name: release_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ReportIDPath:
      name: report_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1

    TokenIDPath:
      name: token_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Insufficient role for this operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    UUID:
      type: string
      format: uuid
      x-go-type: uuid.UUID
      x-go-type-import:
        path: github.com/google/uuid
        name: uuid

    URL:
      type: string
      format: uri

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: invalid request body

    Pagination:
      type: object
      required:
        - page
        - limit
        - total
        - total_pages
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0

    Provider:
      type: object
      required:
        - id
        - name
        - url
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        name:
          type: string
          minLength: 2
          maxLength: 100
        url:
          $ref: "#/components/schemas/URL"

    ProviderCreateRequest:
      type: object
      required:
        - name
        - url
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        url:
          $ref: "#/components/schemas/URL"

    ProviderDataResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Provider"

    ProviderListResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Provider"
        pagination:
          $ref: "#/components/schemas/Pagination"

    Automation:
      type: object
      required:
        - id
        - name
        - provider
        - provider_id
        - url
        - cost_savings
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        name:
          type: string
          minLength: 2
          maxLength: 100
        provider:
          type: string
          minLength: 2
          maxLength: 100
        provider_id:
          $ref: "#/components/schemas/UUID"
        url:
          $ref: "#/components/schemas/URL"
        cost_savings:
          type: number
          format: double
          minimum: 0

    AutomationCreateRequest:
      type: object
      required:
        - name
        - provider_id
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        provider_id:
          $ref: "#/components/schemas/UUID"
        url:
          $ref: "#/components/schemas/URL"
        cost_savings:
          type: number
          format: double
          minimum: 0
          default: 0

    AutomationUpdateRequest:
      type: object
      properties:
        url:
          $ref: "#/components/schemas/URL"
        cost_savings:
          type: number
          format: double
          minimum: 0

    AutomationDataResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Automation"

    AutomationListResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Automation"
        pagination:
          $ref: "#/components/schemas/Pagination"

    Job:
      type: object
      required:
        - id
        - automation_id
        - automation
        - provider
        - status
        - location
        - url
        - created_at
      properties:
        id:
          type: string
          minLength: 1
        automation_id:
          $ref: "#/components/schemas/UUID"
        automation:
          type: string
          minLength: 1
        provider:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/JobStatus"
        location:
          type: string
          minLength: 1
        url:
          $ref: "#/components/schemas/URL"
        metadata:
          $ref: "#/components/schemas/JobMetadata"
        output:
          $ref: "#/components/schemas/JobOutput"
        created_at:
          type: string
          format: date-time

    JobCreateRequest:
      type: object
      required:
        - id
        - status
        - location
        - url
      properties:
        id:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/JobStatus"
        location:
          type: string
          minLength: 1
        url:
          $ref: "#/components/schemas/URL"
        metadata:
          $ref: "#/components/schemas/JobMetadata"
        output:
          $ref: "#/components/schemas/JobOutput"
          description: Required when status is success or failed. Decoded content is limited to 4 MiB by default.

    JobStatus:
      type: string
      enum:
        - skipped
        - success
        - failed

    JobMetadata:
      type: object
      additionalProperties: true

    JobOutput:
      type: string
      description: Base64-encoded output. Decoded content is limited to 4 MiB by default.

    JobDataResponse:
      type: object
      required:
        - data
      properties:
        data:
          $ref: "#/components/schemas/Job"

    JobListResponse:
      type: object
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Job"
        pagination:
          $ref: "#/components/schemas/Pagination"

    ServerMetadata:
      type: object
      properties: {}

    ServerRelationSummary:
      type: object
      required:
        - agent_count
        - job_count
        - release_count
      properties:
        agent_count:
          type: integer
          minimum: 0
        job_count:
          type: integer
          minimum: 0
        release_count:
          type: integer
          minimum: 0

    Server:
      type: object
      required:
        - id
        - hostname
        - metadata
        - operating_system
        - hypervisor
        - location
      properties:
        id:
          $ref: "#/components/schemas/UUID"
        hostname:
          type: string
          minLength: 1
          maxLength: 255
        metadata:
          $ref: "#/components/schemas/ServerMetadata"
        operating_system:
          type: string
        hypervisor:
          type: string
        location:
          type: string

    ServerListItem:
      allOf:
        - $ref: "#/components/schemas/Server"
        - type: object
          required:
            - relations
            - compliant
          properties:
            relations:
              $ref: "#/components/schemas/ServerRelationSummary"
            compliant:
              type: boolean

    ServerWithRelations:
      allOf:
        - $ref: "#/components/schemas/Server"
