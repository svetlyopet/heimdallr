openapi: 3.0.0
info:
  title: Heimdallr API
  version: 1.0.0
  description: API for managing software applications, releases, reports, servers, agents, providers, automations, and automation jobs.

servers:
  - url: /api
    description: API base path

tags:
  - name: Application
  - name: Release
  - name: Report
  - name: Provider
  - name: Automation
  - name: Job
  - name: Server
  - name: Agent
  - name: RequiredAgent
  - name: Analytics
  - name: Auth
  - name: Token
  - name: Health

security:
  - BearerAuth: []
  - SessionCookie: []

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/application:
    get:
      tags:
        - Application
      summary: List applications
      operationId: listApplications
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Applications returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Application
      summary: Create application
      operationId: createApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationCreateRequest"
      responses:
        "201":
          description: Application created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/application/{application_id}:
    get:
      tags:
        - Application
      summary: Get application by ID
      operationId: getApplication
      parameters:
        - $ref: "#/components/parameters/ApplicationIDPath"
      responses:
        "200":
          description: Application returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/application/{application_id}/release:
    get:
      tags:
        - Release
      summary: List releases for an application
      operationId: listReleases
      parameters:
        - $ref: "#/components/parameters/ApplicationIDPath"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Releases returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Release
      summary: Create release for an application
      operationId: createRelease
      parameters:
        - $ref: "#/components/parameters/ApplicationIDPath"
        - name: upsert
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When true, update an existing release with the same version instead of returning a conflict
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseCreateRequest"
      responses:
        "201":
          description: Release created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/application/{application_id}/release/{release_id}:
    get:
      tags:
        - Release
      summary: Get release by ID
      operationId: getRelease
      parameters:
        - $ref: "#/components/parameters/ApplicationIDPath"
        - $ref: "#/components/parameters/ReleaseIDPath"
      responses:
        "200":
          description: Release returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseWithComplianceDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/application/{application_id}/release/{release_id}/report:
    get:
      tags:
        - Report
      summary: List reports for a release
      operationId: listReleaseReports
      parameters:
        - $ref: "#/components/parameters/ApplicationIDPath"
        - $ref: "#/components/parameters/ReleaseIDPath"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Reports returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Report
      summary: Create report for a release
      operationId: createReleaseReport
      parameters:
        - $ref: "#/components/parameters/ApplicationIDPath"
        - $ref: "#/components/parameters/ReleaseIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportCreateRequest"
      responses:
        "201":
          description: Report created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/application/{application_id}/release/{release_id}/report/{report_id}:
    get:
      tags:
        - Report
      summary: Get report by ID
      operationId: getReleaseReport
      parameters:
        - $ref: "#/components/parameters/ApplicationIDPath"
        - $ref: "#/components/parameters/ReleaseIDPath"
        - $ref: "#/components/parameters/ReportIDPath"
      responses:
        "200":
          description: Report returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/provider:
    get:
      tags:
        - Provider
      summary: List providers
      operationId: listProviders
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Providers returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Provider
      summary: Create provider
      operationId: createProvider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderCreateRequest"
      responses:
        "201":
          description: Provider created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/provider/{provider_id}:
    get:
      tags:
        - Provider
      summary: Get provider by ID
      operationId: getProvider
      parameters:
        - $ref: "#/components/parameters/ProviderIDPath"
      responses:
        "200":
          description: Provider returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/automation:
    get:
      tags:
        - Automation
      summary: List automations
      operationId: listAutomations
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Automations returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Automation
      summary: Create automation
      operationId: createAutomation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationCreateRequest"
      responses:
        "201":
          description: Automation created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/automation/{automation_id}:
    get:
      tags:
        - Automation
      summary: Get automation by ID
      operationId: getAutomation
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
      responses:
        "200":
          description: Automation returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      tags:
        - Automation
      summary: Update automation
      operationId: updateAutomation
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationUpdateRequest"
      responses:
        "200":
          description: Automation updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags:
        - Automation
      summary: Delete automation
      operationId: deleteAutomation
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
      responses:
        "204":
          description: Automation deleted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/job:
    get:
      tags:
        - Job
      summary: List jobs across automations
      operationId: listJobsGlobal
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: automation_id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/JobStatus"
      responses:
        "200":
          description: Jobs returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/automation/{automation_id}/job:
    get:
      tags:
        - Job
      summary: List jobs for automation
      operationId: listAutomationJobs
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Jobs returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Job
      summary: Create job for automation
      operationId: createAutomationJob
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobCreateRequest"
      responses:
        "201":
          description: Job created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/automation/{automation_id}/job/{job_id}:
    get:
      tags:
        - Job
      summary: Get job by composite ID
      description: Returns a job scoped by automation ID and job ID.
      operationId: getAutomationJob
      parameters:
        - $ref: "#/components/parameters/AutomationIDPath"
        - $ref: "#/components/parameters/JobID"
      responses:
        "200":
          description: Job returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/report:
    get:
      tags:
        - Report
      summary: List reports across applications
      operationId: listReportsGlobal
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: application_id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
        - name: release_id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/ReportStatus"
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum:
              - sast
              - dast
              - sbom
              - code_coverage
              - custom
      responses:
        "200":
          description: Reports returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/server:
    get:
      tags:
        - Server
      summary: List servers
      operationId: listServers
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: agent_id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
          description: Return only servers where the given agent is installed
      responses:
        "200":
          description: Servers returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Server
      summary: Create server
      operationId: createServer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerCreateRequest"
      responses:
        "201":
          description: Server created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/server/{server_id}:
    get:
      tags:
        - Server
      summary: Get server by ID
      operationId: getServer
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
      responses:
        "200":
          description: Server returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerWithRelationsDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    put:
      tags:
        - Server
      summary: Register agents on an existing server
      operationId: updateServer
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerUpdateRequest"
      responses:
        "200":
          description: Server updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerWithRelationsDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/agent:
    get:
      tags:
        - Agent
      summary: List agents
      operationId: listGlobalAgents
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: unassigned
          in: query
          required: false
          schema:
            type: boolean
          description: When true, return only agents not linked to any server
        - name: server_id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
          description: Return only agents installed on the given server
        - name: agent_id
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/UUID"
          description: Return only the agent with the given ID
      responses:
        "200":
          description: Agents returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Agent
      summary: Register an unassigned agent
      operationId: createUnassignedAgent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentCreateRequest"
      responses:
        "201":
          description: Agent created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/agent/{agent_id}:
    get:
      tags:
        - Agent
      summary: Get agent by ID
      operationId: getGlobalAgent
      parameters:
        - $ref: "#/components/parameters/AgentIDPath"
      responses:
        "200":
          description: Agent returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDetailDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags:
        - Agent
      summary: Delete an agent and all server links
      operationId: deleteGlobalAgent
      parameters:
        - $ref: "#/components/parameters/AgentIDPath"
      responses:
        "204":
          description: Agent deleted successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/agent/{agent_id}/server:
    get:
      tags:
        - Agent
      summary: List servers where an agent is installed
      operationId: listAgentServers
      parameters:
        - $ref: "#/components/parameters/AgentIDPath"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Servers returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentServerListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/server/{server_id}/agent:
    get:
      tags:
        - Agent
      summary: List agents installed on a server
      operationId: listAgents
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Agents returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags:
        - Agent
      summary: Create or link an agent on a server
      operationId: createAgent
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerAgentRequest"
      responses:
        "201":
          description: Agent created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/server/{server_id}/agent/{agent_id}:
    get:
      tags:
        - Agent
      summary: Get agent by ID
      operationId: getAgent
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
        - $ref: "#/components/parameters/AgentIDPath"
      responses:
        "200":
          description: Agent returned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDataResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags:
        - Agent
      summary: Detach an agent from a server
      operationId: detachAgent
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
        - $ref: "#/components/parameters/AgentIDPath"
      responses:
        "204":
          description: Agent detached successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/server/{server_id}/job:
    get:
      tags:
        - Server
      summary: List automation jobs associated with a server
      operationId: listServerJobs
      parameters:
        - $ref: "#/components/parameters/ServerIDPath"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
