name: E2E Compliance

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compliance-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - uses: docker/setup-buildx-action@v3
      - name: Build Heimdallr image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: heimdallr:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Start Heimdallr stack
        run: make e2e-up-ci
      - name: Run compliance E2E
        run: make e2e-compliance-run
      - name: Stop stack
        if: always()
        run: make e2e-down-ci
