name: E2E Compliance

on:
  workflow_dispatch:

jobs:
  compliance-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Heimdallr stack
        run: make e2e-up
      - name: Run compliance E2E
        run: make e2e-compliance
      - name: Stop stack
        if: always()
        run: make e2e-down
