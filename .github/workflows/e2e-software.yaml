name: E2E Software

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  software-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - uses: docker/setup-buildx-action@v4
      - name: Build Heimdallr image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: heimdallr:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Start Heimdallr stack
        run: HEIMDALLR_IMAGE=heimdallr:ci COMPOSE_BUILD=0 make e2e-up
      - name: Run software E2E
        run: make e2e-software-run
      - name: Stop stack
        if: always()
        run: make e2e-down
