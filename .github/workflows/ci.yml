name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: heimdallr
          POSTGRES_PASSWORD: heimdallr
          POSTGRES_DB: heimdallr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U heimdallr -d heimdallr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_POSTGRES_URL: postgres://heimdallr:heimdallr@127.0.0.1:5432/heimdallr?sslmode=disable
      TEST_DB_MANAGED: "0"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Download modules
        run: go mod download
      - name: Run unit tests
        run: make test-unit

  lint-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Download modules
        run: go mod download
      - name: Check formatting
        run: make check-fmt
      - name: Check generated code
        run: make check-generated
      - name: Create web embed stub
        run: make test-web-stub
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  security-sast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Download modules
        run: go mod download
      - name: govulncheck
        run: make govulncheck
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: -no-fail -fmt sarif -out gosec.sarif ./...
      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif

  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests, lint-api, security-sast]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: heimdallr
          POSTGRES_PASSWORD: heimdallr
          POSTGRES_DB: heimdallr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U heimdallr -d heimdallr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_POSTGRES_URL: postgres://heimdallr:heimdallr@127.0.0.1:5432/heimdallr?sslmode=disable
      TEST_DB_MANAGED: "0"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Run integration tests
        run: make test-integration

  e2e-docker-build:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Build Heimdallr image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: heimdallr:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e-operations:
    runs-on: ubuntu-latest
    needs: [e2e-docker-build]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - uses: docker/setup-buildx-action@v3
      - name: Load Heimdallr image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: heimdallr:ci
          cache-from: type=gha
      - name: Install Ansible
        run: pip install ansible
      - name: Start stack
        run: HEIMDALLR_IMAGE=heimdallr:ci COMPOSE_BUILD=0 make e2e-up
      - name: Run operations E2E
        run: make e2e-operations-run
      - name: Stop stack
        if: always()
        run: make e2e-down

  e2e-software:
    runs-on: ubuntu-latest
    needs: [e2e-docker-build]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - uses: docker/setup-buildx-action@v3
      - name: Load Heimdallr image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: heimdallr:ci
          cache-from: type=gha
      - name: Start stack
        run: HEIMDALLR_IMAGE=heimdallr:ci COMPOSE_BUILD=0 make e2e-up
      - name: Run software E2E
        run: make e2e-software-run
      - name: Stop stack
        if: always()
        run: make e2e-down

  e2e-fleet:
    runs-on: ubuntu-latest
    needs: [e2e-docker-build]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - uses: docker/setup-buildx-action@v3
      - name: Load Heimdallr image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: heimdallr:ci
          cache-from: type=gha
      - name: Start stack
        run: HEIMDALLR_IMAGE=heimdallr:ci COMPOSE_BUILD=0 make e2e-up
      - name: Run fleet E2E
        run: make e2e-fleet-run
      - name: Stop stack
        if: always()
        run: make e2e-down

  security-dast:
    runs-on: ubuntu-latest
    needs: [e2e-docker-build]
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Load Heimdallr image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: heimdallr:ci
          cache-from: type=gha
      - name: Start stack
        run: HEIMDALLR_IMAGE=heimdallr:ci COMPOSE_BUILD=0 make e2e-up
      - name: Run OWASP ZAP DAST
        run: ./scripts/zap-dast.sh
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: /tmp/heimdallr-zap/zap-report.html
      - name: Stop stack
        if: always()
        run: make e2e-down
