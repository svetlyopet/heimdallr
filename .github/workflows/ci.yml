name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run unit tests
        run: make test

  lint-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Lint API
        run: make lint-api
      - name: Run govulncheck
        run: make govulncheck

  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run integration tests
        run: make test-integration

  e2e-operations:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install Ansible
        run: pip install ansible
      - name: Start stack
        run: make e2e-up
      - name: Run operations E2E
        run: make e2e-operations-run
      - name: Stop stack
        if: always()
        run: make e2e-down

  e2e-compliance:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Start stack
        run: make e2e-up
      - name: Run compliance E2E
        run: make e2e-compliance-run
      - name: Stop stack
        if: always()
        run: make e2e-down

  e2e-fleet:
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Start stack
        run: make e2e-up
      - name: Run fleet E2E
        run: make e2e-fleet-run
      - name: Stop stack
        if: always()
        run: make e2e-down
